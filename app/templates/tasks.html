<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>任务看板 · AI 任务助手</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">✦</div>
      <div class="brand-text">
        <div class="brand-title">AI 任务助手</div>
        <div class="brand-sub">for Vikunja</div>
      </div>
    </div>
    <div class="topbar-right">
      <button id="btn-refresh" class="btn-icon" title="刷新" aria-label="刷新">↻</button>
      <form method="post" action="/logout" class="logout-form">
        <button type="submit" class="btn-icon" title="退出" aria-label="退出">⏻</button>
      </form>
    </div>
  </header>

  <nav class="pagenav">
    <a href="/" class="pagenav-link">✨ AI 建任务</a>
    <a href="/tasks" class="pagenav-link active">📋 任务看板</a>
  </nav>

  <main class="container container-wide">
    <!-- 工具栏:视图 tab + 筛选 -->
    <section class="toolbar card">
      <div class="tabs" id="view-tabs">
        <a href="#list" class="tab" data-view="list">📋 列表</a>
        <a href="#board" class="tab" data-view="board">🗂 看板</a>
        <a href="#calendar" class="tab" data-view="calendar">📅 日历</a>
        <a href="#tree" class="tab" data-view="tree">🌳 树</a>
      </div>
      <div class="filters">
        <select id="filter-project" class="input filter-input" title="按项目筛选">
          <option value="">所有项目</option>
        </select>
        <select id="filter-status" class="input filter-input" title="按状态筛选">
          <option value="all">全部</option>
          <option value="open" selected>未完成</option>
          <option value="done">已完成</option>
        </select>
        <select id="sort-by" class="input filter-input" title="排序">
          <option value="due" selected>按截止</option>
          <option value="priority">按优先级</option>
          <option value="project">按项目</option>
          <option value="title">按标题</option>
        </select>
        <label class="filter-check" title="显示已归档项目的任务">
          <input type="checkbox" id="filter-archived">
          <span>显示归档</span>
        </label>
      </div>
    </section>

    <!-- 加载/错误 占位 -->
    <div id="loading" class="status info">
      <span class="spinner"></span><span>正在加载任务…</span>
    </div>
    <div id="err-box" class="status error" hidden></div>

    <!-- 视图渲染容器(一次只渲染一个视图) -->
    <section id="view-container"></section>

    <!-- 新建任务按钮(FAB) -->
    <button id="btn-new-task" class="fab" title="新建任务" aria-label="新建任务">＋</button>

    <!-- 编辑/新建任务弹窗 -->
    <div id="modal-mask" class="modal-mask" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h2 id="modal-title">编辑任务</h2>
          <button id="modal-close" class="btn-icon" aria-label="关闭">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="m-title">标题</label>
            <input type="text" id="m-title" class="input">
          </div>
          <div class="grid2">
            <div class="field">
              <label for="m-project">项目</label>
              <select id="m-project" class="input"></select>
            </div>
            <div class="field">
              <label for="m-due">截止日期</label>
              <input type="date" id="m-due" class="input">
            </div>
          </div>
          <div class="grid2">
            <div class="field">
              <label for="m-priority">优先级</label>
              <select id="m-priority" class="input">
                <option value="0">0 · 无</option>
                <option value="1">1 · 低</option>
                <option value="2">2 · 较低</option>
                <option value="3">3 · 中</option>
                <option value="4">4 · 较高</option>
                <option value="5">5 · 紧急</option>
              </select>
            </div>
            <div class="field">
              <label for="m-repeat">重复</label>
              <select id="m-repeat" class="input">
                <option value="none">不重复</option>
                <option value="daily">每天</option>
                <option value="weekly">每周</option>
                <option value="monthly">每月</option>
                <option value="yearly">每年</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="m-labels">标签(逗号分隔)</label>
            <input type="text" id="m-labels" class="input" placeholder="例如:报销, 紧急">
          </div>
          <div class="field">
            <label for="m-desc">描述</label>
            <textarea id="m-desc" class="input" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-foot">
          <button id="modal-delete" class="btn btn-ghost btn-danger" hidden>删除</button>
          <span class="modal-foot-spacer"></span>
          <button id="modal-cancel" class="btn btn-ghost">取消</button>
          <button id="modal-save" class="btn btn-primary">保存</button>
        </div>
      </div>
    </div>

    <!-- 项目编辑/新建弹窗 -->
    <div id="proj-modal-mask" class="modal-mask" hidden>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h2 id="proj-modal-title">编辑项目</h2>
          <button id="proj-modal-close" class="btn-icon" aria-label="关闭">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="pm-title">标题</label>
            <input type="text" id="pm-title" class="input">
          </div>
          <div class="grid2">
            <div class="field">
              <label for="pm-parent">父项目</label>
              <select id="pm-parent" class="input">
                <option value="0">(顶层)</option>
              </select>
            </div>
            <div class="field">
              <label for="pm-identifier">标识符(可选,≤10 字)</label>
              <input type="text" id="pm-identifier" class="input" maxlength="10">
            </div>
          </div>
          <div class="field">
            <label>颜色</label>
            <div class="color-palette" id="pm-color-palette">
              <button type="button" class="color-swatch color-none" data-color="" title="默认"></button>
              <button type="button" class="color-swatch" data-color="#6366f1" style="background:#6366f1" title="靛蓝"></button>
              <button type="button" class="color-swatch" data-color="#8b5cf6" style="background:#8b5cf6" title="紫色"></button>
              <button type="button" class="color-swatch" data-color="#ec4899" style="background:#ec4899" title="粉色"></button>
              <button type="button" class="color-swatch" data-color="#ef4444" style="background:#ef4444" title="红色"></button>
              <button type="button" class="color-swatch" data-color="#f97316" style="background:#f97316" title="橙色"></button>
              <button type="button" class="color-swatch" data-color="#f59e0b" style="background:#f59e0b" title="琥珀"></button>
              <button type="button" class="color-swatch" data-color="#10b981" style="background:#10b981" title="绿色"></button>
              <button type="button" class="color-swatch" data-color="#14b8a6" style="background:#14b8a6" title="青色"></button>
              <button type="button" class="color-swatch" data-color="#3b82f6" style="background:#3b82f6" title="蓝色"></button>
              <input type="color" id="pm-color-custom" class="color-custom" value="#6366f1" title="自定义颜色">
            </div>
          </div>
          <div class="field field-inline">
            <label class="checkbox-label">
              <input type="checkbox" id="pm-favorite"> <span>收藏(置顶)</span>
            </label>
          </div>
          <div class="field field-inline">
            <label class="checkbox-label">
              <input type="checkbox" id="pm-archived"> <span>归档(隐藏该项目下任务)</span>
            </label>
          </div>
        </div>
        <div class="modal-foot">
          <button id="proj-modal-delete" class="btn btn-ghost btn-danger" hidden>删除</button>
          <button id="proj-modal-add-sub" class="btn btn-ghost" hidden>+ 子项目</button>
          <span class="modal-foot-spacer"></span>
          <button id="proj-modal-cancel" class="btn btn-ghost">取消</button>
          <button id="proj-modal-save" class="btn btn-primary">保存</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/tasks.js"></script>
</body>
</html>
